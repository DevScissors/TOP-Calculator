<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="page-wrapper">
        <div class="legend-wrapper">
            <h2 class="legend-title">Keyboard Legend</h2>
            <div class="legend-list">
                <ul>
                    <li>ESC = "Clear/AC"</li>
                    <li>Backspace = "Delete digit"</li>
                    <li>ALT = +/- (positive/negative)</li>
                    <br />
                    <li><u>Operators:</u> <br /> Multiply (*) Divide (/)</li>
                </ul>
            </div>
        </div>
        <div class="calculator-wrapper">
            <div class="calculator-container">
                <div class="results-input-container">
                    <span class="expression-display"></span>
                    <input type="text" id="resultsInput" class="results-input" placeholder="0">0</input>
                </div>
                <div class="buttons-wrapper">
                    <div class="buttons-container">
                        <button class="clear misc btn"></button>
                        <button class="positive-negative misc btn">+/-</button>
                        <button class="percentage misc btn" value="%">%</button>
                        <button class="operator-divide operator btn" value="÷">&#x00F7;</button>
                        <button class="number-seven number btn" value="7">7</button>
                        <button class="number-eight number btn" value="8">8</button>
                        <button class="number-nine number btn" value="9">9</button>
                        <button class="operator-multiply operator btn" value="x">x</button>
                        <button class="number-four number btn" value="4">4</button>
                        <button class="number-five number btn" value="5">5</button>
                        <button class="number-six number btn" value="6">6</button>
                        <button class="operator-subtract operator btn" value="-">-</button>
                        <button class="number-one number btn" value="1">1</button>
                        <button class="number-two number btn" value="2">2</button>
                        <button class="number-three number btn" value="3">3</button>
                        <button class="operator-add operator btn" value="+">+</button>
                        <button class="calc-icon number btn"><img src="./images/calc-icon.png"
                                height="30px"></img></button>
                        <button class="number-zero number btn" value="0">0</button>
                        <button class="decimal-point btn" value=".">.</button>
                        <button class="operator-equals btn">=</button>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
