<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="styles.css">
    <script src="script.js" defer></script>
</head>

<body>
    <div class="calculator-wrapper">
        <div class="calculator-container">
            <div class="results-input-container">
                <input type="text" id="resultsInput" class="results-input" value="0"></input>
            </div>
            <div class="buttons-wrapper">
                <div class="buttons-container">
                    <button class="clear btn"></button>
                    <button class="positive-negative btn">+/-</button>
                    <button class="percentage btn">%</button>
                    <button class="operator-divide operator btn">&#x00F7;</button>
                    <button class="number-seven number btn">7</button>
                    <button class="number-eight number btn">8</button>
                    <button class="number-nine number btn">9</button>
                    <button class="operator-multiply operator btn">x</button>
                    <button class="number-four number btn">4</button>
                    <button class="number-five number btn">5</button>
                    <button class="number-six number btn">6</button>
                    <button class="operator-subtract operator btn">-</button>
                    <button class="number-one number btn">1</button>
                    <button class="number-two number btn">2</button>
                    <button class="number-three number btn">3</button>
                    <button class="operator-add operator btn">+</button>
                    <button class="calc-icon btn"><img src="./images/calc-icon.png" height="25px"></img></button>
                    <button class="number-zero number btn">0</button>
                    <button class="decimal-point btn">.</button>
                    <button class="operator-equals operator btn">=</button>
                </div>
            </div>
        </div>
    </div>

</body>

</html>
